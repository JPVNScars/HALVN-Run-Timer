<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HALVN Run Timer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0;padding:15px;text-align:center;}
h1{color:#1565c0}
#timer{font-size:60px;font-weight:bold;margin:20px 0;}
.container{max-width:700px;margin:auto;}
.card{background:white;padding:15px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.08);margin-bottom:15px;}
input,select{width:90%;padding:12px;font-size:18px;margin:6px 0;border-radius:8px;border:1px solid #ccc;}
button{width:90%;padding:16px;font-size:20px;margin:6px 0;border:none;border-radius:10px;cursor:pointer;background:#1976d2;color:white;}
button.green{background:#2e7d32}
button.orange{background:#ef6c00}
table{width:100%;border-collapse:collapse;font-size:14px;}
th{background:#1976d2;color:white;padding:6px;}
td{padding:6px;border-bottom:1px solid #ddd;}
</style>
</head>

<body>

<div class="container">

<h1>HALVN Run Timer</h1>

<div id="timer">00:00.000</div>

<div class="card">
<button onclick="startTimer()">START</button>
<button class="orange" onclick="stopTimer()">STOP</button>
</div>

<div class="card">
<h3>Add Runner</h3>
<input id="bib" placeholder="Bib">
<input id="name" placeholder="Name">
<input id="team" placeholder="Team">
<button onclick="addRunner()">Add Runner</button>
</div>

<div class="card">
<h3>Select Runner for Lap</h3>

<select id="runnerSelect"></select>

<select id="genderSelect">
<option value="male">Male (2 laps)</option>
<option value="female">Female (1 lap)</option>
</select>

<button onclick="recordLap()">LAP</button>

</div>

<div class="card">
<h3>Current Runners</h3>
<table>
<thead>
<tr>
<th>Bib</th>
<th>Name</th>
<th>Team</th>
<th>Lap1</th>
<th>Lap2</th>
<th>Total</th>
</tr>
</thead>
<tbody id="currentTable"></tbody>
</table>
</div>

<div class="card">
<h3>Results</h3>
<table>
<thead>
<tr>
<th>Bib</th>
<th>Name</th>
<th>Team</th>
<th>Lap1</th>
<th>Lap2</th>
<th>Total</th>
</tr>
</thead>
<tbody id="resultsTable"></tbody>
</table>
</div>

<div class="card">
<button class="green" onclick="exportExcel()">Export Excel</button>
</div>

</div>

<script>

let runners=[]
let results=[]

let startTime=0
let running=false
let interval

function pad(n,w=2){return n.toString().padStart(w,"0")}

function format(ms){
if(ms==null) return "-"
let m=Math.floor(ms/60000)
let s=Math.floor(ms/1000)%60
let msr=ms%1000
return `${pad(m)}:${pad(s)}.${pad(msr,3)}`
}

function startTimer(){
if(running) return
startTime=Date.now()
interval=setInterval(()=>{
let diff=Date.now()-startTime
document.getElementById("timer").innerText=format(diff)
},10)
running=true
}

function stopTimer(){
clearInterval(interval)
running=false
}

function resetTimer(){
stopTimer()
document.getElementById("timer").innerText="00:00.000"
}

function addRunner(){

let bib=document.getElementById("bib").value
let name=document.getElementById("name").value
let team=document.getElementById("team").value

if(!bib) return alert("Enter Bib")

runners.push({
bib,
name,
team,
laps:[],
total:null
})

updateSelect()
render()

}

function updateSelect(){

let select=document.getElementById("runnerSelect")
select.innerHTML=""

runners.forEach(r=>{

let opt=document.createElement("option")
opt.value=r.bib
opt.text=r.bib+" - "+(r.name||"")

select.appendChild(opt)

})

}

function recordLap(){

let bib=document.getElementById("runnerSelect").value
let gender=document.getElementById("genderSelect").value

let runner=runners.find(r=>r.bib==bib)

if(!runner){
alert("Runner not found")
return
}

let maxLap=gender==="male"?2:1

if(runner.laps.length>=maxLap){
alert("Max laps reached")
return
}

let time=Date.now()-startTime

runner.laps.push(time)

if(runner.laps.length===maxLap){

runner.total=runner.laps.reduce((a,b)=>a+b,0)

results.push(JSON.parse(JSON.stringify(runner)))

runner.laps=[]
runner.total=null

resetTimer()

}

render()

}

function render(){

let table=document.getElementById("currentTable")
table.innerHTML=""

runners.forEach(r=>{

let row=`<tr>
<td>${r.bib}</td>
<td>${r.name||""}</td>
<td>${r.team||""}</td>
<td>${format(r.laps[0])}</td>
<td>${format(r.laps[1])}</td>
<td>${format(r.total)}</td>
</tr>`

table.innerHTML+=row

})

let res=document.getElementById("resultsTable")
res.innerHTML=""

results.forEach(r=>{

let row=`<tr>
<td>${r.bib}</td>
<td>${r.name||""}</td>
<td>${r.team||""}</td>
<td>${format(r.laps[0])}</td>
<td>${format(r.laps[1])}</td>
<td>${format(r.total)}</td>
</tr>`

res.innerHTML+=row

})

}

/* MOBILE SAFE EXPORT EXCEL */
function exportExcel(){

let data=[]

results.forEach(r=>{

data.push({
Bib:r.bib,
Name:r.name,
Team:r.team,
Lap1:format(r.laps[0]),
Lap2:format(r.laps[1]),
Total:format(r.total)
})

})

let ws=XLSX.utils.json_to_sheet(data)
let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Results")

let wbout = XLSX.write(wb,{bookType:'xlsx',type:'array'})

let blob=new Blob([wbout],{type:"application/octet-stream"})

let link=document.createElement("a")
link.href=URL.createObjectURL(blob)
link.download="HALVN_Run_Result.xlsx"
link.click()

}

</script>

</body>
</html>
